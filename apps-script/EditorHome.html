<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script>
    // Injected by Editor.gs renderEditorHome_.
    var WEB_BOOT  = <?!= webBootJson ?>;
    var MOG_WEB   = true;
    var MOG_STORE = WEB_BOOT.store || '';
    var MOG_ABBR  = WEB_BOOT.abbr || '';
    var BASE_URL  = WEB_BOOT.base || '';
    var THEME     = WEB_BOOT.theme || {};
    var CONCEPT   = WEB_BOOT.concept || '';
    var MOG_TOKEN = null;
  </script>
  <style>
    /* Home dashboard — faithful copy of the MVS web-app design system
       (Inter type, accent header, 880px container, fixed 3-col tile grid,
       soft-shadow centered icon tiles). Per-concept accent set by JS. */
    :root {
      --accent: #0e7c7c; --accent-text: #ffffff; --accent-ink: #0e7c7c;
      --ink: #1d1f1d; --line: #e3e5e3; --bg: #f5f6f5; --card: #ffffff;
      --sp-2: 8px; --sp-3: 12px; --sp-5: 22px; --sp-6: 32px;
      --radius: 12px; --radius-sm: 9px;
      --fs-xs: 11px; --fs-sm: 12px; --fs-base: 13px; --fs-md: 15px; --fs-lg: 16px; --fs-xl: 18px; --fs-2xl: 20px;
      --accent-soft: #eef2f2;
      /* --font, --shadow, --muted, --faint inherited from EditorShell's :root
         (loaded later in <body> on every editor page) — single source of truth. */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--ink); font-family: var(--font); font-size: var(--fs-md); line-height: 1.45; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    [hidden] { display: none !important; }

    .app-header { background: var(--accent); color: var(--accent-text); padding: 16px 20px 18px; }
    /* Web uses the shared EditorShell band instead; renderHome relocates the
       lang buttons into it, so the old header is emptied + hidden. --shell-width
       matches .main (880px) so the band aligns with the dashboard content. */
    body.mge-web { --shell-width: 880px; }
    body.mge-web .app-header { display: none; }
    .ah-top { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3); max-width: 880px; margin: 0 auto; }
    .ah-store { font-size: var(--fs-2xl); font-weight: 800; letter-spacing: .01em; }
    .ah-eyebrow { font-size: var(--fs-xs); font-weight: 700; text-transform: uppercase; letter-spacing: .12em; opacity: .82; margin-bottom: 2px; }
    .lang-toggle { display: inline-flex; background: rgba(255,255,255,.16); border-radius: var(--radius-sm); overflow: hidden; flex: none; }
    .lang-btn { background: transparent; color: var(--accent-text); border: none; padding: 6px 11px; font-size: var(--fs-sm); font-weight: 700; cursor: pointer; opacity: .65; font-family: var(--font); }
    .lang-btn.on { background: rgba(255,255,255,.92); color: var(--accent-ink); opacity: 1; }

    .main { max-width: 880px; margin: 0 auto; padding: 24px 20px 80px; }
    .section-label { font-size: var(--fs-sm); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: var(--sp-5) 2px var(--sp-3); }

    .tile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-3); }
    .tile {
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 24px 14px; text-decoration: none; color: var(--ink); cursor: pointer; font-family: var(--font);
      transition: box-shadow .12s, transform .12s;
    }
    a.tile:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-2px); }
    .tile .ico { color: var(--accent-ink); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
    .tile .ico svg { width: 30px; height: 30px; }
    .tile .ttl { font-size: var(--fs-md); font-weight: 700; line-height: 1.2; }
    .tile.soon { opacity: .5; cursor: default; box-shadow: var(--shadow); }
    .tile.soon .ico { color: var(--faint); }
    .tile .soon-tag { font-size: var(--fs-xs); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); margin-top: 6px; }
    @media (max-width: 600px) { .tile-grid { grid-template-columns: 1fr 1fr; } }

    /* Help CTA banner (MVS-style) + help popup. */
    .help-cta { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; cursor: pointer; background: var(--accent); color: var(--accent-text); border: none; border-radius: var(--radius); padding: 16px 18px; margin-bottom: var(--sp-4); font-family: var(--font); transition: box-shadow .12s, transform .12s; }
    .help-cta:hover { box-shadow: 0 6px 22px rgba(0,0,0,.18); transform: translateY(-2px); }
    .help-cta .hc-ico { flex: none; width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,.18); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; line-height: 1; }
    .help-cta .hc-txt { flex: 1; min-width: 0; }
    .help-cta .hc-ttl { display: block; font-size: var(--fs-lg); font-weight: 800; }
    .help-cta .hc-sub { display: block; font-size: var(--fs-sm); opacity: .92; margin-top: 3px; }
    .help-cta .hc-go { flex: none; background: var(--accent-text); color: var(--accent); font-weight: 800; font-size: var(--fs-sm); padding: 9px 14px; border-radius: var(--radius-sm); }

    .ehelp-overlay { position: fixed; inset: 0; background: rgba(15,18,22,.5); display: flex; align-items: flex-start; justify-content: center; padding: 48px 16px; z-index: 200; overflow: auto; }
    .ehelp-card { background: var(--card); border-radius: var(--radius); width: 100%; max-width: 540px; box-shadow: 0 18px 50px rgba(0,0,0,.28); }
    .ehelp-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); }
    .ehelp-title { font-size: var(--fs-xl); font-weight: 800; }
    .ehelp-x { border: none; background: none; font-size: 24px; line-height: 1; cursor: pointer; color: var(--muted); }
    .ehelp-body { padding: 18px 22px 24px; font-size: var(--fs-base); color: var(--ink); line-height: 1.55; }
    .ehelp-body p { margin: 0 0 12px; }
    .ehelp-body ol { margin: 0 0 14px 18px; padding: 0; }
    .ehelp-body li { margin-bottom: 7px; }
    .ehelp-tip { background: var(--accent-soft); border-radius: var(--radius-sm); padding: 11px 14px; font-size: var(--fs-sm); color: var(--muted); }

    /* ── Guided tour (coach-marks, cutout spotlight — MVS/MPS-style) ── */
    .tour-overlay { position: fixed; inset: 0; background: rgba(20,24,28,.58); z-index: 100; }
    /* Every anchored step dims the page with 4 panels around a bright hole over the target. */
    .tour-frame { position: fixed; background: rgba(20,24,28,.58); z-index: 100; }
    .tour-highlight { position: fixed; z-index: 101; border-radius: var(--radius-sm); border: 2px solid var(--accent-text); box-shadow: 0 0 0 3px var(--accent), 0 0 16px 2px rgba(0,0,0,.35); pointer-events: none; transition: top .15s, left .15s, width .15s, height .15s; }
    .tour-highlight.pulse { animation: tourPulse 1.6s ease-in-out infinite; }
    @keyframes tourPulse { 0%,100% { box-shadow: 0 0 0 3px var(--accent), 0 0 16px 2px rgba(0,0,0,.35); } 50% { box-shadow: 0 0 0 7px var(--accent), 0 0 22px 4px rgba(0,0,0,.35); } }
    .tour-pop { position: fixed; z-index: 102; width: min(330px, 88vw); background: var(--card); border-radius: var(--radius); box-shadow: 0 18px 48px rgba(0,0,0,.28); padding: 16px 18px; }
    .tour-pop .tour-count { font-size: var(--fs-xs); font-weight: 800; color: var(--accent-ink); letter-spacing: .08em; margin-bottom: 4px; }
    .tour-pop .tour-title { font-size: var(--fs-xl); font-weight: 800; color: var(--ink); margin-bottom: 6px; }
    .tour-pop .tour-text { font-size: var(--fs-base); color: var(--ink); line-height: 1.5; margin-bottom: 14px; }
    .tour-actions { display: flex; align-items: center; gap: 8px; }
    .tour-spacer { flex: 1; }
    .tour-skip { background: none; border: none; color: var(--muted); font-size: var(--fs-sm); font-weight: 700; cursor: pointer; font-family: var(--font); padding: 0; }
    .tour-skip:hover { color: var(--ink); }
    .tour-btn { border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-size: var(--fs-sm); font-weight: 800; cursor: pointer; font-family: var(--font); }
    .tour-btn.ghost { background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
    .tour-btn.primary { background: var(--accent); color: var(--accent-text); }
    .tour-pop.arrow-up::before, .tour-pop.arrow-down::before { content: ''; position: absolute; left: var(--arrow-left, 50%); width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent; margin-left: -9px; }
    .tour-pop.arrow-up::before { top: -9px; border-bottom: 9px solid var(--card); }
    .tour-pop.arrow-down::before { bottom: -9px; border-top: 9px solid var(--card); }
  </style>
</head>
<body>
  <?!= include('EditorShell'); ?>

  <div class="app-header">
    <div class="ah-top">
      <div>
        <div class="ah-eyebrow">MOG Editor</div>
        <div class="ah-store" id="home-store">Store</div>
      </div>
      <div class="lang-toggle">
        <button type="button" class="lang-btn" id="home-en" onclick="setHomeLang('en')">EN</button>
        <button type="button" class="lang-btn" id="home-es" onclick="setHomeLang('es')">ES</button>
      </div>
    </div>
  </div>

  <div class="main" id="home-main" hidden></div>

  <div id="ehelp-root"></div>
  <div id="tour-root"></div>

  <script>
    var IC = {
      items:    '<path d="M3.5 7.5 12 3l8.5 4.5v9L12 21l-8.5-4.5z"/><path d="M3.5 7.5 12 12l8.5-4.5"/><path d="M12 12v9"/>',
      vendors:  '<path d="M3.5 3.5h7l10 10-7 7-10-10z"/><circle cx="7.6" cy="7.6" r="1.4"/>',
      areas:    '<path d="M3.5 7.5a2 2 0 0 1 2-2H9l2 2h7.5a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-13a2 2 0 0 1-2-2z"/>',
      pickpath: '<circle cx="6" cy="6" r="2"/><circle cx="18" cy="18" r="2"/><path d="M8 6h7a3 3 0 0 1 0 6H9a3 3 0 0 0 0 6h7"/>',
      history:  '<path d="M3.5 12a8.5 8.5 0 1 0 2.8-6.3"/><path d="M3.5 4.5v4h4"/><path d="M12 8v4.6l3 1.8"/>',
      reset:    '<path d="M20.5 12a8.5 8.5 0 1 1-2.8-6.3"/><path d="M20.5 4.5v4h-4"/>'
    };
    function icon(k) {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + (IC[k] || '') + '</svg>';
    }

    var HOME_SECTIONS = [
      { key: 'catalog', en: 'Catalog', es: 'Catálogo', cards: [
        { key: 'items',    live: true, page: 'items',   en: 'Manage Items',   es: 'Administrar artículos' },
        { key: 'vendors',  live: true, page: 'vendors', en: 'Manage Vendors', es: 'Administrar proveedores' }
      ]},
      { key: 'layout', en: 'Order Sheet Layout', es: 'Diseño de la hoja', cards: [
        { key: 'areas',    live: true, page: 'areas',    en: 'Storage Areas',  es: 'Áreas de almacenamiento' },
        { key: 'pickpath', live: true, page: 'pickpath', en: 'Shelf to Sheet', es: 'Estante a Hoja' }
      ]},
      { key: 'records', en: 'Records', es: 'Registros', cards: [
        { key: 'history',  live: true, page: 'history', en: 'Order History',   es: 'Historial de pedidos' }
      ]}
    ];

    var HOME_T = {
      en: { soon: 'Soon', helpTitle: 'Have a question?', helpSub: 'Open the guide anytime.', helpBtn: 'Help', replayTour: '↻ Replay the walkthrough' },
      es: { soon: 'Pronto', helpTitle: '¿Tienes una pregunta?', helpSub: 'Abre la guía cuando quieras.', helpBtn: 'Ayuda', replayTour: '↻ Repetir el recorrido' }
    };
    var HOME_HELP = {
      en: {
        title: 'Getting started',
        body: '<p>This is the MOG editor — make changes without opening the Google Sheet.</p>'
            + '<ol><li>Use it on a <b>computer</b> (the phone app stays for ordering).</li>'
            + '<li>Enter your store <b>PIN</b> to unlock.</li>'
            + '<li>Pick a tool below to get started.</li></ol>',
        tip: 'Your changes save straight to the store sheet, the same as editing in Google Sheets.'
      },
      es: {
        title: 'Primeros pasos',
        body: '<p>Este es el editor de MOG — haz cambios sin abrir la hoja de Google.</p>'
            + '<ol><li>Úsalo en una <b>computadora</b> (la app del teléfono es para pedidos).</li>'
            + '<li>Ingresa el <b>PIN</b> de tu tienda para entrar.</li>'
            + '<li>Elige una herramienta abajo para empezar.</li></ol>',
        tip: 'Tus cambios se guardan directamente en la hoja de la tienda, igual que editar en Google Sheets.'
      }
    };
    function homeLang() { return mgeGetLang_(); }
    function ht(k) { var l = homeLang(); return (HOME_T[l] && HOME_T[l][k]) || HOME_T.en[k] || k; }
    function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function setHomeLang(l) { mgeSetLang_(l); }       // persists + fires onEditorLangChange
    function onEditorLangChange() { renderHome(); }

    function renderHome() {
      var l = homeLang();
      if (THEME.accent)     { document.documentElement.style.setProperty('--accent', THEME.accent); document.documentElement.style.setProperty('--accent-ink', THEME.accent); }
      if (THEME.bannerFont) document.documentElement.style.setProperty('--accent-text', THEME.bannerFont);
      document.getElementById('home-store').textContent = MOG_STORE || 'Store';
      document.getElementById('home-en').className = 'lang-btn' + (l === 'en' ? ' on' : '');
      document.getElementById('home-es').className = 'lang-btn' + (l === 'es' ? ' on' : '');
      // Mount the shared header band (logo → location → MOG) and relocate the
      // lang buttons into it; idempotent across re-renders. Then sync the band's
      // bilingual subtitle to the current language (the band lives outside #home-main).
      mgeMountWebChrome_();
      var bandEn = document.querySelector('.mge-web-mog .en');
      var bandEs = document.querySelector('.mge-web-mog .es');
      if (bandEn) bandEn.style.display = (l === 'es') ? 'none' : 'inline';
      if (bandEs) bandEs.style.display = (l === 'es') ? 'inline' : 'none';

      var h = '';
      h += '<button type="button" class="help-cta" data-tour="help" onclick="openEditorHelp()">'
         + '<span class="hc-ico">?</span>'
         + '<span class="hc-txt"><span class="hc-ttl">' + esc(ht('helpTitle')) + '</span>'
         + '<span class="hc-sub">' + esc(ht('helpSub')) + '</span></span>'
         + '<span class="hc-go">' + esc(ht('helpBtn')) + '</span></button>';
      for (var s = 0; s < HOME_SECTIONS.length; s++) {
        var sec = HOME_SECTIONS[s];
        h += '<div class="section-label">' + esc(l === 'es' ? sec.es : sec.en) + '</div>';
        h += '<div class="tile-grid" data-tour="sec-' + esc(sec.key || ('s' + s)) + '">';
        for (var i = 0; i < sec.cards.length; i++) {
          var c = sec.cards[i];
          var inner =
            '<div class="ico">' + icon(c.key) + '</div>' +
            '<div class="ttl">' + esc(l === 'es' ? c.es : c.en) + '</div>' +
            (c.live ? '' : '<div class="soon-tag">' + esc(ht('soon')) + '</div>');
          if (c.live) {
            h += '<a class="tile" target="_top" href="' + esc(BASE_URL) + '?page=' + esc(c.page) + '">' + inner + '</a>';
          } else {
            h += '<div class="tile soon">' + inner + '</div>';
          }
        }
        h += '</div>';
      }
      var main = document.getElementById('home-main');
      main.innerHTML = h;
      main.removeAttribute('hidden');
      maybeAutoStartTour_();
    }

    function openEditorHelp() {
      var c = HOME_HELP[homeLang()] || HOME_HELP.en;
      document.getElementById('ehelp-root').innerHTML =
        '<div class="ehelp-overlay" id="ehelp-overlay" onclick="if(event.target.id===\'ehelp-overlay\')closeEditorHelp()">' +
          '<div class="ehelp-card" role="dialog" aria-modal="true">' +
            '<div class="ehelp-head"><span class="ehelp-title">' + esc(c.title) + '</span>' +
            '<button type="button" class="ehelp-x" onclick="closeEditorHelp()" aria-label="Close">&times;</button></div>' +
            '<div class="ehelp-body">' + c.body + '<div class="ehelp-tip">' + esc(c.tip) + '</div>' +
            '<p style="margin:14px 0 0"><button type="button" class="tour-btn primary" onclick="replayHomeTour()">' + esc(ht('replayTour')) + '</button></p></div>' +
          '</div></div>';
    }
    function closeEditorHelp() { document.getElementById('ehelp-root').innerHTML = ''; }
    document.addEventListener('keydown', function (e) { if (e.keyCode === 27) { closeEditorHelp(); if (TOUR.active) endTour(); } });

    /* ───────── First-run guided tour (coach-marks) ─────────
       One page (no SPA views), so no cross-view walk. Language is already chosen
       at the PIN gate, so the tour opens in the right language — no splash. Steps
       are informational (no input-gating). Fires once per browser; replay from the
       help popup. ES5 / Rhino-safe (var, function, no arrows/template literals). */
    var TOUR = { active: false, step: 0, steps: [], started: false };

    var TOUR_STEPS_HOME = [
      { sel: null,
        en: { title: 'Welcome to the editor', body: 'Make changes to your store from a computer — no Google Sheet needed. Here\'s a 30-second tour.' },
        es: { title: 'Bienvenido al editor', body: 'Haz cambios en tu tienda desde una computadora — sin abrir la hoja de Google. Aquí tienes un recorrido de 30 segundos.' } },
      { sel: '.mge-web-hd',
        en: { title: 'Your store & language', body: 'Your store is shown up here. Tap EN / ES anytime to switch language.' },
        es: { title: 'Tu tienda e idioma', body: 'Tu tienda aparece aquí arriba. Toca EN / ES para cambiar de idioma cuando quieras.' } },
      { sel: '[data-tour="sec-catalog"]',
        en: { title: 'Catalog', body: 'Start here: Manage Items is what you order; Manage Vendors is who you order from.' },
        es: { title: 'Catálogo', body: 'Empieza aquí: Administrar artículos es lo que pides; Administrar proveedores es a quién le pides.' } },
      { sel: '[data-tour="sec-layout"]',
        en: { title: 'Order sheet layout', body: 'Storage Areas groups your items; Shelf to Sheet sets the order they appear on the order sheet — so you count the kitchen in one walk.' },
        es: { title: 'Diseño de la hoja', body: 'Áreas de almacenamiento agrupa tus artículos; Estante a Hoja define el orden en que aparecen en la hoja — para contar la cocina en un solo recorrido.' } },
      { sel: '[data-tour="sec-records"]',
        en: { title: 'Order history', body: 'Browse past orders by date, item, or vendor. This one is read-only.' },
        es: { title: 'Historial de pedidos', body: 'Explora pedidos anteriores por fecha, artículo o proveedor. Este es solo de lectura.' } },
      { sel: '[data-tour="help"]',
        en: { title: 'Need help later?', body: 'Open this anytime for the guide — and to replay this walkthrough. Every tool also has its own ? button.' },
        es: { title: '¿Necesitas ayuda después?', body: 'Ábrelo cuando quieras para ver la guía — y para repetir este recorrido. Cada herramienta también tiene su propio botón ?.' } }
    ];

    var TOUR_T = {
      en: { skip: 'Skip', back: 'Back', next: 'Next', done: 'Done' },
      es: { skip: 'Omitir', back: 'Atrás', next: 'Siguiente', done: 'Listo' }
    };
    function tt(k) { var l = homeLang(); return (TOUR_T[l] && TOUR_T[l][k]) || TOUR_T.en[k] || k; }

    function startHomeTour() {
      closeEditorHelp();
      TOUR.steps = TOUR_STEPS_HOME; TOUR.active = true; TOUR.step = 0;
      renderTour();
    }
    function tourTarget_() { var s = TOUR.steps[TOUR.step]; if (!s || !s.sel) return null; return document.querySelector(s.sel); }

    function renderTour() {
      var root = document.getElementById('tour-root'); if (!root) return;
      var s = TOUR.steps[TOUR.step]; if (!s) { endTour(); return; }
      var l = homeLang();
      var c = (l === 'es' && s.es) ? s.es : s.en;
      var last = TOUR.step === TOUR.steps.length - 1;
      var hasTarget = !!(s.sel && document.querySelector(s.sel));
      var h = '';
      if (hasTarget) {
        // Four dim panels frame a bright hole over the target (cutout spotlight).
        h += '<div class="tour-frame" id="tour-fr-t"></div><div class="tour-frame" id="tour-fr-r"></div>';
        h += '<div class="tour-frame" id="tour-fr-b"></div><div class="tour-frame" id="tour-fr-l"></div>';
        h += '<div class="tour-highlight pulse" id="tour-hl"></div>';
      } else {
        h += '<div class="tour-overlay"></div>';   // welcome / no-anchor step: flat dim, centered bubble
      }
      h += '<div class="tour-pop" id="tour-pop">';
      h +=   '<div class="tour-count">' + (TOUR.step + 1) + ' / ' + TOUR.steps.length + '</div>';
      h +=   '<div class="tour-title">' + esc(c.title) + '</div>';
      h +=   '<div class="tour-text">' + esc(c.body) + '</div>';
      h +=   '<div class="tour-actions">';
      h +=     '<button type="button" class="tour-skip" onclick="endTour()">' + esc(tt('skip')) + '</button>';
      h +=     '<span class="tour-spacer"></span>';
      if (TOUR.step > 0) h += '<button type="button" class="tour-btn ghost" onclick="tourBack()">' + esc(tt('back')) + '</button>';
      h +=     '<button type="button" class="tour-btn primary" onclick="tourNext()">' + esc(last ? tt('done') : tt('next')) + '</button>';
      h +=   '</div>';
      h += '</div>';
      root.innerHTML = h;
      var target = s.sel ? document.querySelector(s.sel) : null;
      if (target && target.scrollIntoView) {
        try { target.scrollIntoView({ block: 'center', inline: 'nearest' }); }
        catch (e) { try { target.scrollIntoView(); } catch (e2) {} }
      }
      tourReposition_();
    }

    function tourNext() { if (TOUR.step < TOUR.steps.length - 1) { TOUR.step++; renderTour(); } else { endTour(); } }
    function tourBack() { if (TOUR.step > 0) { TOUR.step--; renderTour(); } }
    function endTour() { TOUR.active = false; var r = document.getElementById('tour-root'); if (r) r.innerHTML = ''; }

    function tourReposition_() {
      if (!TOUR.active) return;
      var pop = document.getElementById('tour-pop'); if (!pop) return;
      var hl = document.getElementById('tour-hl');
      var target = tourTarget_();
      var vh = window.innerHeight, vw = window.innerWidth, pad = 6, gap = 14;
      if (!target) {
        if (hl) hl.style.display = 'none';
        tourFrame_(null, 0);
        pop.className = 'tour-pop';
        pop.style.top = Math.max(gap, (vh - pop.offsetHeight) / 2) + 'px';
        pop.style.left = Math.max(gap, (vw - pop.offsetWidth) / 2) + 'px';
        return;
      }
      var r = target.getBoundingClientRect();
      if (hl) {
        hl.style.display = 'block';
        hl.style.top = (r.top - pad) + 'px'; hl.style.left = (r.left - pad) + 'px';
        hl.style.width = (r.width + pad * 2) + 'px'; hl.style.height = (r.height + pad * 2) + 'px';
      }
      tourFrame_(r, pad);
      var ph = pop.offsetHeight, pw = pop.offsetWidth, place, top, left;
      if (r.bottom + gap + ph <= vh) { top = r.bottom + gap; place = 'up'; }
      else if (r.top - gap - ph >= 0) { top = r.top - gap - ph; place = 'down'; }
      else { top = Math.max(gap, (vh - ph) / 2); place = 'none'; }
      left = Math.max(gap, Math.min(vw - pw - gap, r.left + r.width / 2 - pw / 2));
      pop.className = 'tour-pop arrow-' + place;
      pop.style.top = top + 'px'; pop.style.left = left + 'px';
      var arrowLeft = (r.left + r.width / 2) - left;
      arrowLeft = Math.max(16, Math.min(pw - 16, arrowLeft));
      pop.style.setProperty('--arrow-left', arrowLeft + 'px');
    }

    // Cover the viewport with four dim panels EXCEPT a hole over rect r (the
    // cutout spotlight). r null → hide all four. Recomputed every reposition.
    function tourFrame_(r, pad) {
      var pt = document.getElementById('tour-fr-t'), pr = document.getElementById('tour-fr-r'),
          pb = document.getElementById('tour-fr-b'), pl = document.getElementById('tour-fr-l');
      if (!pt || !pr || !pb || !pl) return;
      if (!r) { pt.style.display = 'none'; pr.style.display = 'none'; pb.style.display = 'none'; pl.style.display = 'none'; return; }
      var vw = window.innerWidth, vh = window.innerHeight;
      var hx = Math.max(0, r.left - pad), hy = Math.max(0, r.top - pad);
      var hw = r.width + pad * 2, hh = r.height + pad * 2;
      var hr = hx + hw, hb = hy + hh;
      function box(el, x, y, w, hgt) { el.style.display = 'block'; el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.width = Math.max(0, w) + 'px'; el.style.height = Math.max(0, hgt) + 'px'; }
      box(pt, 0, 0, vw, hy);          // above the hole
      box(pb, 0, hb, vw, vh - hb);    // below the hole
      box(pl, 0, hy, hx, hh);         // left of the hole
      box(pr, hr, hy, vw - hr, hh);   // right of the hole
    }
    window.addEventListener('resize', function () { if (TOUR.active) tourReposition_(); });
    window.addEventListener('scroll', function () { if (TOUR.active) tourReposition_(); }, true);

    function replayHomeTour() { closeEditorHelp(); startHomeTour(); }

    // First run only (once per browser); returning users skip straight in.
    function maybeAutoStartTour_() {
      if (TOUR.started) return;            // latch: don't re-fire on re-render (e.g. lang toggle)
      var seen = false;
      try { seen = localStorage.getItem('mog_edit_tour_seen') === '1'; } catch (e) {}
      if (seen) return;
      TOUR.started = true;
      try { localStorage.setItem('mog_edit_tour_seen', '1'); } catch (e) {}
      setTimeout(startHomeTour, 350);      // let the home DOM settle before anchoring
    }

    // Gate first (device + PIN, or skip if a shared token exists), then render.
    mgeStartGate_(renderHome);
  </script>
</body>
